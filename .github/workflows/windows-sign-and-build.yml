name: Build & Sign Windows Installer

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-sign-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Build renderer
        run: npm run build

      - name: Write code signing certificate
        # Expects secrets.PFX_BASE64 (base64-encoded PFX) and secrets.PFX_PASSWORD
        env:
          PFX_BASE64: ${{ secrets.PFX_BASE64 }}
        run: |
          node -e "require('fs').writeFileSync('build/codesign.pfx', Buffer.from(process.env.PFX_BASE64,'base64'))"

      - name: Package & Sign (Windows)
        env:
          CSC_LINK: "file://${{ github.workspace }}/build/codesign.pfx"
          CSC_KEY_PASSWORD: ${{ secrets.PFX_PASSWORD }}
        run: |
          npx electron-builder --win --x64 --publish never --config.directories.output=release

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: va-trackme-windows-installer
          path: release/*.exe

